<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frise chronologique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="index2-body">

    <header>
        <a href="index.html" class="retour">← Retour</a>
        <h3>Barre d'outil :</h3>

        <button id="sauvegarder">Sauvegarder</button>
        <div id="modalSauvegarder" class="modalSauvegarder">
            <div class="modalContentSauvegarder">
                <p>Voulez-vous vraiment sauvegarder la frise ?</p>
                <button id="confirmerSauvegarder">Confirmer</button>
                <button id="annulerSauvegarder">Annuler</button>
            </div>
        </div>

        <button id="nouvelElement">Nouvel élément</button>
        <div id="modalNouvelElement" class="modalNouvelElement">
            <div class="modalContentNouvelElement">
                <h2>Nouvel événement</h2>

                <label for="titre">Titre :</label>
                <input type="text" id="titre">

                <label for="dateDebut">Date de début :</label>
                <input type="date" id="dateDebut">

                <label for="dateFin">Date de fin :</label>
                <input type="date" id="dateFin">

                <label for="couleur">Couleur :</label>
                <input type="color" id="couleur">

<button id="creerNouvelElement">Créer</button>
<button id="annulerNouvelElement">Annuler</button>
            </div>
        </div>
        <button id="annuler">Annuler</button>

        <button id="refaire">Refaire</button>


    </header>
    
    <main>

        <section id="workspace">

            <div class="timeline">
                <div class="timeline-top">
                    <div class="border-bottom"></div>
                </div>

                <div class="timelineEvents"></div>

                <div class="timeline-bottom">
                    <div class="border-top"></div>
                </div>

            </div>

        </section>

    </main>
<script src="script.js"></script>
</body>
