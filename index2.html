<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frise chronologique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="index2-body">

    <header>
        <a href="index.html" class="retour">← Retour</a>
        <h3>Barre d'outil :</h3>

        <button id="sauvegarder">Sauvegarder</button>
        <div id="modal" class="modal">
            <div class="modal-content">
                <p>Voulez-vous vraiment sauvegarder la frise ?</p>
                <button id="confirmer">Confirmer</button>
                <button id="annulerModal">Annuler</button>
            </div>
        </div>
        <button id="nouvel-element">Nouvel élément</button>

        <button id="annuler">Annuler</button>

        <button id="refaire">Refaire</button>

    </header>
    
    <main>

        <section id="workspace">

            <div class="timeline">
                <div class="timeline-top">
                    <div class="border-bottom"></div>
                </div>

                <div class="timeline-events"></div>

                <div class="timeline-bottom">
                    <div class="border-top"></div>
                </div>

            </div>

        </section>

    </main>
<script src="script.js"></script>
</body>
